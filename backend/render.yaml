services:
  - type: web
    name: fasa-backend
    runtime: docker
    dockerfilePath: ./Dockerfile
    plan: free
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRY_HOURS
        value: "168"
      - key: FRONTEND_ORIGIN
        value: "https://fa-sa-xlqd.vercel.app,http://localhost:5173"
      - key: PORT
        value: "8080"
      - key: SQLX_OFFLINE
        value: "true"
    healthCheckPath: /api/health
